name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }} · Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          # macOS is the primary target OS — cover it on the min + max Pythons.
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Install package (dev + server extras)
        run: pip install -e ".[dev,server]"

      # NOTE: The package shells out to external CLIs (claude / codex / agy),
      # which are not installed in CI and require subscription auth. We run
      # ONLY the offline/unit test suite here — no live provider calls.
      - name: Run tests
        run: pytest -q

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Smoke test the built wheel in a clean virtual environment
        run: |
          python -m venv /tmp/unified-cli-wheel-smoke
          /tmp/unified-cli-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/unified-cli-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/unified-cli-wheel-smoke/bin/unified-cli --version
          /tmp/unified-cli-wheel-smoke/bin/python -c "import unified_cli; print(unified_cli.__version__)"

  ext-test:
    name: Ext (${{ matrix.os }} · Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Core and Ext test environments
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,server]"
          python -m pip install -e "packages/unified-cli-ext[dev]"

      - name: Check generated Ext provider support tables
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.9'
        run: python scripts/check_ext_provider_support.py --check

      - name: Run Ext offline fixture suite
        run: pytest -q packages/unified-cli-ext/tests

      - name: Verify Core and Ext imports are independent
        run: |
          python -c "import unified_cli; assert unified_cli.__version__ == '0.5.0'"
          python -c "import unified_cli_ext; assert unified_cli_ext.__version__ == '0.1.0'"

  ext-optional-extras:
    name: Ext optional ${{ matrix.extra }} · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
        extra: [acp, mcp]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install one optional integration
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -e "packages/unified-cli-ext[dev,${{ matrix.extra }}]"

      - name: Run Ext tests with the optional dependency present
        run: pytest -q packages/unified-cli-ext/tests

      - name: Check the environment
        run: python -m pip check

  distribution-pair:
    name: Core + Ext distribution boundary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Build both distributions independently
        run: |
          python -m build --outdir dist/core .
          python -m build --outdir dist/ext packages/unified-cli-ext

      - name: Verify sdists have no source-only repository tests
        run: |
          python - <<'PY'
          import tarfile
          from pathlib import Path

          checks = (
              ("core", "tests/test_distribution_pair.py"),
              ("ext", "tests/test_ext_provider_support_docs.py"),
          )
          for distribution, suffix in checks:
              archive_path = next(Path("dist", distribution).glob("*.tar.gz"))
              with tarfile.open(archive_path, "r:gz") as archive:
                  names = archive.getnames()
              if any(name.endswith("/" + suffix) for name in names):
                  raise SystemExit(
                      distribution + " sdist contains a source-only repository test"
                  )
          PY

      - name: Check metadata and wheel path separation
        run: |
          python -m twine check dist/core/* dist/ext/*
          python scripts/verify_distribution_pair.py \
            dist/core/*.whl dist/ext/*.whl \
            --core-version 0.5.0 --ext-version 0.1.0

      - name: Smoke test Core-only wheel
        run: |
          python -m venv /tmp/unified-core-only
          /tmp/unified-core-only/bin/python -m pip install --upgrade pip
          /tmp/unified-core-only/bin/python -m pip install dist/core/*.whl
          /tmp/unified-core-only/bin/unified-cli --version
          /tmp/unified-core-only/bin/python -c "import importlib.util, unified_cli; assert importlib.util.find_spec('unified_cli_ext') is None"
          /tmp/unified-core-only/bin/python -m pip check

      - name: Smoke test pair and Ext removal recovery
        run: |
          python -m venv /tmp/unified-core-ext
          /tmp/unified-core-ext/bin/python -m pip install --upgrade pip
          /tmp/unified-core-ext/bin/python -m pip install dist/core/*.whl dist/ext/*.whl
          /tmp/unified-core-ext/bin/python -c "import unified_cli, unified_cli_ext; assert unified_cli.__version__ == '0.5.0'; assert unified_cli_ext.__version__ == '0.1.0'"
          /tmp/unified-core-ext/bin/python -m pip check

          /tmp/unified-core-ext/bin/python -m pip uninstall -y unified-cli-ext
          /tmp/unified-core-ext/bin/unified-cli --version
          /tmp/unified-core-ext/bin/python -c "import importlib.util, unified_cli; assert importlib.util.find_spec('unified_cli_ext') is None"
          /tmp/unified-core-ext/bin/python -m pip check

  browser-e2e:
    name: Browser dashboard (opt-in)
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'browser-e2e')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install Python test server dependencies
        run: python -m pip install ".[dev,server]"

      - name: Install pinned browser harness and Chromium
        working-directory: tests/browser
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright + axe dashboard checks
        working-directory: tests/browser
        run: npm test
