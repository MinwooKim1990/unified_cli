name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }} · Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          # macOS is the primary target OS — cover it on the min + max Pythons.
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.14"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Install package (dev + server extras)
        run: pip install -e ".[dev,server]"

      # NOTE: The package shells out to external CLIs (claude / codex / agy),
      # which are not installed in CI and require subscription auth. We run
      # ONLY the offline/unit test suite here — no live provider calls.
      - name: Run tests
        run: pytest -q

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Smoke test the built wheel in a clean virtual environment
        run: |
          python -m venv /tmp/unified-cli-wheel-smoke
          /tmp/unified-cli-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/unified-cli-wheel-smoke/bin/python -m pip install dist/*.whl
          /tmp/unified-cli-wheel-smoke/bin/unified-cli --version
          /tmp/unified-cli-wheel-smoke/bin/python -c "import unified_cli; print(unified_cli.__version__)"
