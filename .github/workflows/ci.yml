name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (${{ matrix.os }} · Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the unified development environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,server]"

      - name: Run Core offline tests
        run: python -m pytest -q

  performance:
    name: Pinned-reference offline performance gate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Checkout immutable performance reference
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: performance-reference
          persist-credentials: false
          ref: be1478884735c862e894959944ba53e149ea4210

      - name: Set up exact performance Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14.6"

      - name: Install hash-locked performance dependencies
        run: >-
          PIP_CONFIG_FILE=/dev/null python -m pip install --isolated --no-cache-dir --require-hashes --only-binary=:all: --index-url https://pypi.org/simple -r scripts/performance-requirements.txt

      - name: Run pinned-reference offline performance gate
        run: >-
          python scripts/check_performance.py
          --reference-root performance-reference

  ext-test:
    name: Bundled extensions (${{ matrix.os }} · Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the one project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,server]"

      - name: Check generated extension provider support tables
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.9'
        run: python scripts/check_ext_provider_support.py --check

      - name: Run bundled extension offline fixtures
        run: python -m pytest -q packages/unified-cli-ext/tests

      - name: Exercise macOS libc waitid compatibility path
        if: matrix.os == 'macos-latest' && matrix.python-version == '3.9'
        env:
          UNIFIED_CLI_EXT_TEST_DARWIN_LIBC_WAITID: "1"
        run: |
          python -m pytest -q \
            packages/unified-cli-ext/tests/test_process_portability.py \
            packages/unified-cli-ext/tests/test_jsonl_jsonrpc.py \
            packages/unified-cli-ext/tests/test_provider_adapters.py \
            -k "darwin_libc_waitid or group_signals_never_follow_leader_reap or timeout_and_explicit_cancellation_cleanup or escaped_descendant_inherited_pipes_cannot_block_cleanup or early_close_kills_descendant_process_group or fixed_process_timeout_cancel_flood_and_term_ignore_cleanup or fixed_process_kills_descendants_and_falls_back_when_killpg_fails or fixed_process_detached_inherited_pipe_cannot_deadlock_close or post_popen_runtime_error_reaps_and_cleans_environment"

      - name: Verify namespace versions share the release
        run: |
          python -c "import unified_cli; assert unified_cli.__version__ == '0.5.3'"
          python -c "import unified_cli_ext; assert unified_cli_ext.__version__ == '0.5.3'"

  ext-optional-extras:
    name: Optional ${{ matrix.extra }} · Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.14"]
        extra: [acp, mcp]
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install one optional integration from the unified project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,${{ matrix.extra }}]"

      - name: Run extension tests with the optional dependency present
        run: python -m pytest -q packages/unified-cli-ext/tests

      - name: Check the environment
        run: python -m pip check

  ext-lab-fixture:
    name: Ext lab fixture (${{ matrix.os }} · Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.9"
          - os: macos-latest
            python-version: "3.14"
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the offline test runner
        run: python -m pip install "pytest>=7"

      - name: Run the source-only lab fixture suite
        run: python -m pytest -q tools/unified_ext_lab/tests

  unified-distribution:
    name: One wheel · two namespaces
    runs-on: ubuntu-latest
    steps:
      - name: Checkout candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Checkout the legacy split source for migration-only smoke
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          path: legacy-source
          persist-credentials: false
          ref: 7abb7ebc36a4668b3cc9634fd65af5c75b30c758

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Build exactly one distribution
        run: python -m build --outdir dist/unified .

      - name: Verify exact unified artifacts
        run: |
          python -m twine check dist/unified/*
          python scripts/verify_unified_release_artifacts.py \
            dist/unified --version 0.5.3

      - name: Rebuild the wheel from the verified sdist
        run: |
          python -m pip wheel --no-deps --wheel-dir dist/rebuilt \
            dist/unified/unified_cli-0.5.3.tar.gz
          mkdir dist/rebuilt-pair
          cp dist/rebuilt/unified_cli-0.5.3-py3-none-any.whl \
            dist/rebuilt-pair/
          cp dist/unified/unified_cli-0.5.3.tar.gz dist/rebuilt-pair/
          python scripts/verify_unified_release_artifacts.py \
            dist/rebuilt-pair --version 0.5.3

      - name: Smoke test the clean unified wheel and uninstall
        run: |
          python -m venv /tmp/unified-wheel-smoke
          /tmp/unified-wheel-smoke/bin/python -m pip install --upgrade pip
          /tmp/unified-wheel-smoke/bin/python -m pip install \
            dist/unified/unified_cli-0.5.3-py3-none-any.whl
          test "$(/tmp/unified-wheel-smoke/bin/unified-cli --version)" = "0.5.3"
          /tmp/unified-wheel-smoke/bin/unified-cli --help >/dev/null
          /tmp/unified-wheel-smoke/bin/python \
            scripts/verify_single_distribution.py --version 0.5.3
          /tmp/unified-wheel-smoke/bin/python -m pip check
          /tmp/unified-wheel-smoke/bin/python -m pip uninstall -y unified-cli
          /tmp/unified-wheel-smoke/bin/python -c \
            "import importlib.util; assert importlib.util.find_spec('unified_cli') is None; assert importlib.util.find_spec('unified_cli_ext') is None"

      - name: Smoke test legacy local split cleanup and unified reinstall
        run: |
          python -m build --wheel --outdir dist/legacy-ext \
            legacy-source/packages/unified-cli-ext
          python -m venv /tmp/unified-migration-smoke
          /tmp/unified-migration-smoke/bin/python -m pip install --upgrade pip
          /tmp/unified-migration-smoke/bin/python -m pip install \
            "unified-cli==0.5.0" dist/legacy-ext/unified_cli_ext-0.1.0-py3-none-any.whl
          /tmp/unified-migration-smoke/bin/python -m pip uninstall -y \
            unified-cli-ext
          /tmp/unified-migration-smoke/bin/python -m pip install \
            --force-reinstall \
            dist/unified/unified_cli-0.5.3-py3-none-any.whl
          /tmp/unified-migration-smoke/bin/python \
            scripts/verify_single_distribution.py --version 0.5.3
          /tmp/unified-migration-smoke/bin/python -m pip check

  browser-e2e:
    name: Browser dashboard (opt-in)
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'browser-e2e')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Install Python test server dependencies
        run: python -m pip install ".[dev,server]"

      - name: Install pinned browser harness and Chromium
        working-directory: tests/browser
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright + axe dashboard checks
        working-directory: tests/browser
        run: npm test

  required-ci:
    name: Required CI gate
    if: always()
    needs: [test, performance, ext-test, ext-optional-extras, ext-lab-fixture, unified-distribution]
    runs-on: ubuntu-latest
    steps:
      - name: Fail closed unless every required job succeeded
        run: |
          test "${{ needs.test.result }}" = "success"
          test "${{ needs.performance.result }}" = "success"
          test "${{ needs.ext-test.result }}" = "success"
          test "${{ needs.ext-optional-extras.result }}" = "success"
          test "${{ needs.ext-lab-fixture.result }}" = "success"
          test "${{ needs.unified-distribution.result }}" = "success"
