name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install build
        run: python -m pip install --upgrade pip build

      - name: Install package (dev + server extras)
        run: pip install -e ".[dev,server]"

      # NOTE: The package shells out to external CLIs (claude / codex / agy),
      # which are not installed in CI and require subscription auth. We run
      # ONLY the offline/unit test suite here — no live provider calls.
      - name: Run tests
        run: pytest -q

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: pipx run twine check dist/*
